name: Send - UK/EU (7am WAT Mon-Thu)

on:
  schedule:
    # 6:07 UTC = 7:07 WAT (= 7am GMT / 8am CET / 4pm AEST / 2pm SGT)
    - cron: '7 6 * * 1-4'
  workflow_dispatch:

concurrency:
  group: send-emails
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send 15 emails to UK/EU
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: npm run send-emails 15 UK_EU
