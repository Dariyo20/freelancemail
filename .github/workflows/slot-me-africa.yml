name: Send - ME/Africa (6am WAT Sun-Thu)

on:
  schedule:
    # 5:07 UTC = 6:07 WAT. The :07 minute dodges GH Actions cron congestion
    # at the top of every hour (documented delay source).
    # 0-4 in cron-DOW = Sun-Thu, respecting Israel's weekend (Fri/Sat).
    - cron: '7 5 * * 0-4'
  workflow_dispatch:

concurrency:
  group: send-emails
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send 10 emails to ME/Africa
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: npm run send-emails 10 ME_AFRICA
