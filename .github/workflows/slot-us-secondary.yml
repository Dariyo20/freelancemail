name: Send - Americas second wave (3pm WAT Mon-Thu)

on:
  schedule:
    # 14:07 UTC = 15:07 WAT (= 9am EST / 11am BRT)
    - cron: '7 14 * * 1-4'
  workflow_dispatch:

concurrency:
  group: send-emails
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send 15 emails to Americas
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: npm run send-emails 15 US_CA
